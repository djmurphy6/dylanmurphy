<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iDylan Murphy</title>
    <link rel="icon" type="image/png" href="images/favicon.png" />
    <!-- Link to external CSS file -->
    <link rel="stylesheet" href="style.css">
    <!-- Favicon (optional) -->
    <link rel="icon" href="images/favicon.ico">
</head>
<body>
    <!-- iPod Body (persistent shell — never reloaded during navigation) -->
    <div class="ipod-body">
        <!-- iPod Screen: content is swapped in/out by js/router.js -->
        <div class="ipod-screen" id="screen-root">
            <!-- Top Bar -->
            <div class="ipod-top">
                <div class="ipod-top-left"></div>
                <div class="ipod-top-middle">
                    <h1 class="pixel-text">iDylan Murphy</h1>
                </div>
                <div class="ipod-top-right">
                    <img src="images/battery.png" alt="battery" class="battery">
                </div>
            </div>
            <!-- Menu -->
            <ul class="menu pixel-text">
                <li><a href="/skills" style="color: inherit; text-decoration: none;">Skills</a></li>
                <li><a href="/lang" style="color: inherit; text-decoration: none;">Programming Languages</a></li>
                <li data-action="alert" data-alert-text="Projects page coming soon!">Projects</li>
                <li><a href="/linkedin" style="color: inherit; text-decoration: none;">LinkedIn</a></li>
                <li><a href="/github" style="color: inherit; text-decoration: none;">GitHub</a></li>
                <li><a href="/nowplaying" style="color: inherit; text-decoration: none;">Now Playing</a></li>
            </ul>
        </div>

        <!-- Gen 1 outer button ring + click wheel (persistent, shared across all screens) -->
        <div class="wheel-container" id="wheel-container">
            <button class="wheel-btn btn-menu" id="btn-menu">menu</button>
            <button class="wheel-btn btn-prev" id="btn-prev" aria-label="Previous"></button>
            <button class="wheel-btn btn-next" id="btn-next" aria-label="Next"></button>
            <button class="wheel-btn btn-play" id="btn-play" aria-label="Play"></button>
            <div class="click-wheel" id="click-wheel">
                <div class="button center" id="center-button" style="border-radius: 50%; width: 100px; height: 100px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);"></div>
            </div>
        </div>
    </div>

    <script src="js/grid.js"></script>
    <script src="js/screens.js"></script>
    <script src="js/ipod.js"></script>
    <script src="js/router.js"></script>
    <script src="js/cursor.js"></script>
</body>
</html>
