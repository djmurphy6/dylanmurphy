<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iDylan Murphy - Now Playing</title>
    <!-- Link to external CSS file -->
    <link rel="stylesheet" href="style.css">
    <!-- Favicon (optional) -->
    <link rel="icon" href="favicon.ico">
</head>
<body>
    <!-- iPod Body -->
    <div class="ipod-body">
        <!-- iPod Screen -->
        <div class="ipod-screen">
            <!-- Top Bar -->
            <div class="ipod-top">
                <div class="ipod-top-left">
                    <span class="pixel-text" style="padding-left: 10px;">▶</span>
                </div>
                <div class="ipod-top-middle">
                    <h1 class="pixel-text">Now Playing</h1>
                </div>
                <div class="ipod-top-right">
                    <img src="images/battery.png" alt="battery" class="battery">
                </div>
            </div>
            
            <!-- Now Playing Content -->
            <div class="now-playing-content">
                <div class="track-info pixel-text">
                    <div class="track-number">1 of 1</div>
                    <div class="song-title">Single Handed Sailor</div>
                    <div class="artist-name">Dire Straights</div>
                    <div class="album-name">Communiqué</div>
                </div>
                
                <!-- Progress Bar -->
                <div class="progress-container">
                    <div class="progress-bar">
                        <div class="progress-fill"></div>
                    </div>
                </div>
                
                <!-- Time Display -->
                <div class="time-display pixel-text">
                    <span class="current-time">1:09</span>
                    <span class="remaining-time">-3:33</span>
                </div>
            </div>
        </div>
        
        <!-- Gen 1 outer button ring + click wheel -->
        <div class="wheel-container">
            <button class="wheel-btn btn-menu" id="btn-menu">menu</button>
            <button class="wheel-btn btn-prev" id="btn-prev">⏮</button>
            <button class="wheel-btn btn-next" id="btn-next">⏭</button>
            <button class="wheel-btn btn-play" id="btn-play">⏯</button>
            <div class="click-wheel" id="click-wheel">
                <div class="button center" id="center-button" style="border-radius: 50%; width: 100px; height: 100px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);"></div>
            </div>
        </div>
    </div>

    <script>
        const clickWheel = document.getElementById('click-wheel');
        const centerButton = document.getElementById('center-button');

        let isMouseDown = false;
        let lastAngle = 0;
        let totalRotation = 0;
        const sensitivity = 1.5;

        function getAngle(event, element) {
            const rect = element.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const x = event.clientX - centerX;
            const y = event.clientY - centerY;
            return Math.atan2(y, x) * (180 / Math.PI);
        }

        clickWheel.addEventListener('mousedown', function(e) {
            if (e.target === centerButton) return;
            isMouseDown = true;
            lastAngle = getAngle(e, clickWheel);
            clickWheel.style.cursor = 'grabbing';
            e.preventDefault();
        });

        document.addEventListener('mousemove', function(e) {
            if (!isMouseDown) return;
            lastAngle = getAngle(e, clickWheel);
        });

        document.addEventListener('mouseup', function() {
            isMouseDown = false;
            clickWheel.style.cursor = 'grab';
            totalRotation = 0;
        });

        clickWheel.addEventListener('touchstart', function(e) {
            if (e.target === centerButton) return;
            isMouseDown = true;
            lastAngle = getAngle(e.touches[0], clickWheel);
            e.preventDefault();
        });

        document.addEventListener('touchmove', function(e) {
            if (!isMouseDown) return;
            lastAngle = getAngle(e.touches[0], clickWheel);
            e.preventDefault();
        });

        document.addEventListener('touchend', function() {
            isMouseDown = false;
            totalRotation = 0;
        });

        centerButton.addEventListener('click', function(e) {
            e.stopPropagation();
            window.location.href = 'index.html';
        });

        document.getElementById('btn-menu').addEventListener('click', function(e) {
            e.stopPropagation();
            window.history.back();
        });

        document.getElementById('btn-prev').addEventListener('click', function(e) {
            e.stopPropagation();
        });

        document.getElementById('btn-next').addEventListener('click', function(e) {
            e.stopPropagation();
        });

        document.getElementById('btn-play').addEventListener('click', function(e) {
            e.stopPropagation();
            window.location.href = 'index.html';
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
